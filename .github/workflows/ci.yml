name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend tests + lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Run backend tests
        working-directory: backend
        run: uv run pytest

      - name: Run Ruff (scoped rollout)
        working-directory: backend
        run: uv run ruff check app/__init__.py app/models/project.py app/services/run_registry.py app/services/report_agent.py app/services/simulation_manager.py app/services/simulation_runner.py app/utils/json_io.py app/utils/validation.py app/config.py app/storage/embedding_service.py app/api/simulation.py app/api/simulation_common.py app/api/simulation_entities.py app/api/simulation_lifecycle.py app/api/simulation_prepare.py app/api/simulation_profiles.py app/api/simulation_run.py app/api/simulation_interviews.py app/api/simulation_history.py tests/test_project_manager.py tests/test_run_registry.py tests/test_validation.py tests/test_simulation_api_routes.py tests/test_embedding_service.py tests/test_report_manager.py

  frontend:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend build
        working-directory: frontend
        run: npm run build
